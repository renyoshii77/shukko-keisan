<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="出稿計算">
<meta name="mobile-web-app-capable" content="yes">
<title>出稿数量 計算ツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f0ede8;
    --surface: #ffffff;
    --surface2: #f7f4f0;
    --border: #d8d2c8;
    --accent: #2d5a3d;
    --accent-light: #e8f0ea;
    --accent2: #c4853a;
    --text: #1a1a1a;
    --muted: #7a7268;
    --ok: #2d5a3d;
    --ok-bg: #e8f0ea;
    --warn: #c4853a;
    --warn-bg: #fdf3e7;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 16px;
  }

  /* ヘッダー固定 */
  .header {
    background: var(--accent);
    color: white;
    text-align: center;
    padding: 16px 16px 14px;
    position: sticky; top: 0; z-index: 100;
  }
  .header h1 { font-size: 17px; font-weight: 700; letter-spacing: 0.06em; }
  .header p  { font-size: 11px; opacity: 0.75; margin-top: 2px; }

  .scroll-body { padding: 14px 14px 80px; }

  .card {
    background: var(--surface);
    border-radius: 16px;
    box-shadow: var(--shadow);
    padding: 18px 16px;
    margin-bottom: 12px;
  }

  .sec-title {
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* 瓶サイズ：大きめボタン */
  .bottle-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
  .bottle-btn {
    border: 2px solid var(--border); border-radius: 14px;
    background: var(--surface2); cursor: pointer;
    padding: 16px 6px; text-align: center;
    transition: all 0.15s; -webkit-appearance: none;
    touch-action: manipulation;
  }
  .bottle-btn:active { transform: scale(0.96); }
  .bottle-btn.selected { border-color: var(--accent); background: var(--accent-light); }
  .bottle-btn .sz {
    font-size: 22px; font-weight: 700; color: var(--accent);
    font-family: 'DM Mono',monospace; display: block; margin-bottom: 6px;
  }
  .bottle-btn .info { font-size: 10px; color: var(--muted); line-height: 1.7; }
  .bottle-btn.selected .info { color: var(--accent); }

  /* 入力欄：タップしやすく大きめ */
  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .ig { display: flex; flex-direction: column; gap: 5px; }
  .ig label { font-size: 13px; font-weight: 700; color: var(--text); }
  .ig .sublabel { font-size: 11px; color: var(--muted); }
  .ig input {
    font-family: 'DM Mono',monospace; font-size: 24px; font-weight: 500;
    padding: 14px 13px; border: 2px solid var(--border); border-radius: 12px;
    background: var(--surface2); color: var(--text); outline: none;
    width: 100%; -webkit-appearance: none;
    transition: border-color 0.15s;
  }
  .ig input:focus { border-color: var(--accent); background: var(--surface); }
  .ig input.loss { border-color: #e0a87c; }
  .ig input.loss:focus { border-color: var(--accent2); }
  .input-half { max-width: 50%; }

  /* 単位トグル */
  .unit-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .unit-btn {
    border: 2px solid var(--border); border-radius: 14px;
    background: var(--surface2); cursor: pointer;
    padding: 16px 12px; text-align: center;
    transition: all 0.15s; -webkit-appearance: none;
    touch-action: manipulation;
  }
  .unit-btn:active { transform: scale(0.96); }
  .unit-btn.selected { border-color: var(--accent2); background: var(--warn-bg); }
  .unit-btn .un { font-size: 16px; font-weight: 700; display: block; margin-bottom: 4px; color: var(--text); }
  .unit-btn.selected .un { color: var(--accent2); }
  .unit-btn .uc { font-size: 12px; color: var(--muted); font-family: 'DM Mono',monospace; }
  .unit-btn.selected .uc { color: var(--accent2); }

  /* 結果 */
  .results-wrap { display: none; }
  .results-wrap.visible { display: block; }

  .res-card {
    background: var(--surface); border-radius: 16px;
    box-shadow: var(--shadow); padding: 18px 16px;
    margin-bottom: 12px;
  }

  .current-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    margin-bottom: 16px; padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .cur-block .cur-label { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 3px; }
  .cur-block .cur-note  { font-size: 10px; color: var(--muted); margin-bottom: 6px; line-height: 1.5; min-height: 28px; }
  .cur-block .cur-qty   { font-family: 'DM Mono',monospace; font-size: 32px; font-weight: 500; color: var(--accent); line-height: 1; }
  .cur-block .cur-unit  { font-size: 12px; color: var(--muted); margin-top: 3px; }

  .loss-badge {
    display: inline-block; margin-top: 5px;
    font-size: 12px; font-weight: 700;
    color: var(--accent2); background: var(--warn-bg);
    border-radius: 6px; padding: 3px 8px;
  }

  .judge {
    border-radius: 10px; padding: 13px 14px;
    font-size: 14px; font-weight: 700; margin-bottom: 14px;
  }
  .judge.ok   { background: var(--ok-bg);   color: var(--ok); }
  .judge.warn { background: var(--warn-bg); color: var(--warn); }

  .pat-header {
    display: grid; grid-template-columns: 1fr 1fr 1fr auto;
    gap: 6px; padding: 0 10px 8px;
    font-size: 11px; color: var(--muted); font-weight: 700;
  }
  .pat-header span:not(:first-child) { text-align: right; }

  .patterns { display: flex; flex-direction: column; gap: 8px; }
  .pat-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr auto;
    gap: 6px; align-items: center;
    border-radius: 10px; padding: 12px 10px;
  }
  .pat-row.increase { background: #eef6f7; }
  .pat-row.decrease { background: #fdf3e7; }
  .pat-row.exact    { background: var(--ok-bg); }

  .pat-row .p-label { font-size: 11px; color: var(--muted); }
  .pat-row .p-filling, .pat-row .p-packing, .pat-row .p-boxes {
    font-family: 'DM Mono',monospace; font-size: 13px; font-weight: 700; text-align: right;
  }
  .pat-row.increase .p-filling,
  .pat-row.increase .p-packing { color: #2a7a8a; }
  .pat-row.decrease .p-filling,
  .pat-row.decrease .p-packing { color: var(--warn); }
  .pat-row.exact    .p-filling,
  .pat-row.exact    .p-packing { color: var(--ok); }
  .pat-row .p-boxes { color: var(--muted); font-size: 12px; }

  /* iPhone safe area対応 */
  @supports (padding-bottom: env(safe-area-inset-bottom)) {
    .scroll-body { padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>

<div class="header">
  <h1>出稿数量 計算ツール</h1>
  <p>充填・包装の数量チェック</p>
</div>

<div class="scroll-body">

  <!-- ① 瓶サイズ -->
  <div class="card">
    <div class="sec-title">① 瓶サイズ</div>
    <div class="bottle-grid">
      <button class="bottle-btn" data-size="5K" onclick="selectBottle(this)">
        <span class="sz">5K</span><span class="info">外箱：10本<br>PK：100個</span>
      </button>
      <button class="bottle-btn" data-size="9K" onclick="selectBottle(this)">
        <span class="sz">9K</span><span class="info">外箱：10個<br>PK：80個</span>
      </button>
      <button class="bottle-btn" data-size="13K" onclick="selectBottle(this)">
        <span class="sz">13K</span><span class="info">外箱：4個<br>PK：48個</span>
      </button>
    </div>
  </div>

  <!-- ② 数量入力 -->
  <div class="card">
    <div class="sec-title">② 数量入力</div>
    <div class="input-row">
      <div class="ig">
        <label>予定数量</label>
        <div class="sublabel">検体込みの合計</div>
        <input type="number" id="plannedQty" inputmode="numeric" pattern="[0-9]*" min="0" placeholder="0" oninput="calculate()">
      </div>
      <div class="ig">
        <label>検体数量</label>
        <div class="sublabel">予定数量に含む</div>
        <input type="number" id="sampleQty" inputmode="numeric" pattern="[0-9]*" min="0" placeholder="0" oninput="calculate()">
      </div>
    </div>
  </div>

  <!-- ③ 包装ロス -->
  <div class="card">
    <div class="sec-title">③ 包装ロス</div>
    <div class="input-half">
      <div class="ig">
        <label>ロス数</label>
        <div class="sublabel">充填に加算</div>
        <input type="number" id="lossQty" class="loss" inputmode="numeric" pattern="[0-9]*" min="0" placeholder="0" oninput="calculate()">
      </div>
    </div>
  </div>

  <!-- ④ 単位選択 -->
  <div class="card">
    <div class="sec-title">④ 割り切り単位</div>
    <div class="unit-toggle">
      <button class="unit-btn" data-unit="PK" onclick="selectUnit(this)">
        <span class="un">PK単位</span>
        <span class="uc" id="pkCount">—</span>
      </button>
      <button class="unit-btn" data-unit="外箱" onclick="selectUnit(this)">
        <span class="un">外箱単位</span>
        <span class="uc" id="boxCount">—</span>
      </button>
    </div>
  </div>

  <!-- 結果 -->
  <div class="results-wrap" id="resultsWrap">
    <div class="res-card">
      <div class="sec-title">計算結果</div>

      <div class="current-row">
        <div class="cur-block">
          <div class="cur-label">充填</div>
          <div class="cur-note" id="fillingNote">—</div>
          <div class="cur-qty" id="fillingQty">—</div>
          <div class="cur-unit">個</div>
          <div id="fillingBadge"></div>
        </div>
        <div class="cur-block">
          <div class="cur-label">包装</div>
          <div class="cur-note" id="packingNote">—</div>
          <div class="cur-qty" id="packingQty">—</div>
          <div class="cur-unit">個</div>
        </div>
      </div>

      <div class="judge" id="packingJudge">—</div>

      <div class="pat-header">
        <span></span>
        <span>充填</span>
        <span>包装</span>
        <span>個口</span>
      </div>
      <div class="patterns" id="packingPatterns"></div>
    </div>
  </div>

</div><!-- /scroll-body -->

<script>
const CFG = {
  '5K':  { box: 10, pk: 100 },
  '9K':  { box: 10, pk: 80  },
  '13K': { box: 4,  pk: 48  }
};
let selBottle = null, selUnit = null;

function selectBottle(el) {
  document.querySelectorAll('.bottle-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selBottle = el.dataset.size;
  const c = CFG[selBottle];
  document.getElementById('pkCount').textContent  = `${c.pk}個 / PK`;
  document.getElementById('boxCount').textContent = `${c.box}個 / 外箱`;
  calculate();
}

function selectUnit(el) {
  document.querySelectorAll('.unit-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  selUnit = el.dataset.unit;
  calculate();
}

function getPatterns(packingQty, fillingOffset, divisor) {
  if (packingQty <= 0) return [];
  const rem = packingQty % divisor;
  if (rem === 0) {
    return [{ type:'exact', packing:packingQty, filling:packingQty+fillingOffset, boxes:packingQty/divisor, label:'ぴったり' }];
  }
  const results = [];
  for (let i = 1; i <= 2; i++) {
    const boxes = Math.ceil(packingQty / divisor) - 1 + i;
    const np = boxes * divisor;
    results.push({ type:'increase', packing:np, filling:np+fillingOffset, boxes, label:`＋${np-packingQty}個 増やす` });
  }
  for (let i = 1; i <= 2; i++) {
    const boxes = Math.ceil(packingQty / divisor) - i;
    if (boxes <= 0) continue;
    const np = boxes * divisor;
    results.push({ type:'decrease', packing:np, filling:np+fillingOffset, boxes, label:`－${packingQty-np}個 減らす` });
  }
  return results;
}

function calculate() {
  const planned = parseInt(document.getElementById('plannedQty').value) || 0;
  const sample  = parseInt(document.getElementById('sampleQty').value)  || 0;
  const loss    = parseInt(document.getElementById('lossQty').value)    || 0;

  if (!selBottle || !selUnit || (!planned && !sample)) {
    document.getElementById('resultsWrap').classList.remove('visible');
    return;
  }

  const c = CFG[selBottle];
  const divisor   = selUnit === 'PK' ? c.pk : c.box;
  const unitLabel = selUnit;

  const packingQty = Math.max(0, planned - sample);
  const fillingQty = planned + loss;

  let noteText = `検体 ${sample.toLocaleString()} 含む`;
  if (loss > 0) noteText += `　ロス ＋${loss}`;
  document.getElementById('fillingQty').textContent  = fillingQty.toLocaleString();
  document.getElementById('fillingNote').textContent = noteText;
  document.getElementById('packingQty').textContent  = packingQty.toLocaleString();
  document.getElementById('packingNote').textContent = `検体 ${sample.toLocaleString()} 除く`;

  document.getElementById('fillingBadge').innerHTML = loss > 0
    ? `<span class="loss-badge">ロス ＋${loss}本</span>` : '';

  const rem = packingQty % divisor;
  const judgeEl = document.getElementById('packingJudge');
  if (packingQty <= 0) {
    judgeEl.className = 'judge warn';
    judgeEl.textContent = '包装数量が 0 です';
  } else if (rem === 0) {
    judgeEl.className = 'judge ok';
    judgeEl.textContent = `✅ 割り切れます（${(packingQty/divisor).toLocaleString()} ${unitLabel}）`;
  } else {
    judgeEl.className = 'judge warn';
    judgeEl.textContent = `⚠️ 余り ${rem}個（${Math.floor(packingQty/divisor)} ${unitLabel} ＋ ${rem}個）`;
  }

  const patsEl = document.getElementById('packingPatterns');
  patsEl.innerHTML = '';
  getPatterns(packingQty, sample + loss, divisor).forEach(p => {
    const row = document.createElement('div');
    row.className = `pat-row ${p.type}`;
    const arrow = p.type==='increase' ? '▲' : p.type==='decrease' ? '▼' : '●';
    row.innerHTML = `
      <span class="p-label">${arrow} ${p.label}</span>
      <span class="p-filling">${p.filling.toLocaleString()}個</span>
      <span class="p-packing">${p.packing.toLocaleString()}個</span>
      <span class="p-boxes">${p.boxes}${unitLabel}</span>
    `;
    patsEl.appendChild(row);
  });

  document.getElementById('resultsWrap').classList.add('visible');
}
</script>
</body>
</html>
